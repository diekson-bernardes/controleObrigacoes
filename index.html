<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Controle Fiscal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" integrity="sha384-jZvDSsmGB9oGGT/4l9bHXGoAv1OxvG/cFmSo0dZaSqmBgvQTKDBFAMftlXTmMbNW" crossorigin="anonymous">
  <style>
    :root {
      --azul:#1a56db; --azul-claro:#e8f0fe;
      --verde:#057a55;
      --amarelo:#c27803; --amarelo-claro:#fdf6b2;
      --cinza:#6b7280; --borda:#e5e7eb;
      --bg:#f9fafb; --card:#ffffff; --texto:#111827; --texto-suave:#6b7280;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--texto);font-size:14px}
    .header{background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(26,86,219,.3)}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-icon{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .header-title{font-size:18px;font-weight:700}
    .header-sub{font-size:12px;opacity:.8;margin-top:1px}
    .header-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;color:var(--cinza)}
    .spinner{width:40px;height:40px;border:3px solid var(--borda);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .main{padding:20px 24px;max-width:1400px;margin:0 auto}
    .section-title{font-size:12px;font-weight:600;color:var(--cinza);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:20px}
    .section-title:first-child{margin-top:0}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .kpi-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .kpi-label{font-size:12px;color:var(--texto-suave);font-weight:500}
    .kpi-value{font-size:28px;font-weight:700;line-height:1;letter-spacing:-1px}
    .kpi-footer{font-size:11px;color:var(--texto-suave)}
    .kpi-blue .kpi-value{color:var(--azul)}
    .kpi-green .kpi-value{color:var(--verde)}
    .kpi-amber .kpi-value{color:var(--amarelo)}
    .kpi-pill{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
    .pill-amber{background:var(--amarelo-claro);color:var(--amarelo)}
    .charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
    .chart-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
    .chart-title{font-size:14px;font-weight:600}
    .chart-sub{font-size:11px;color:var(--texto-suave);margin-top:2px}
    .chart-wrap{position:relative;height:220px}
    .bottom-row{display:grid;grid-template-columns:1fr 320px;gap:14px}
    .table-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
    .fin-card{background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .fin-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda)}
    .fin-row:last-child{border-bottom:none;padding-bottom:0}
    .fin-comp{font-weight:600;font-size:13px;min-width:64px}
    .fin-bars{display:flex;flex-direction:column;gap:4px;flex:1;margin:0 10px}
    .fin-bar-wrap{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--cinza)}
    .fin-bar-bg{flex:1;height:6px;background:var(--borda);border-radius:3px;overflow:hidden}
    .fin-bar-fill{height:100%;border-radius:3px}
    .fin-bar-pago{background:var(--verde)}
    .fin-bar-pend{background:#faca15}
    .fin-total{font-size:12px;font-weight:700;text-align:right;min-width:76px}
    .badge{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
    .badge-sn{background:#dbeafe;color:#1d4ed8}.badge-lp{background:#d1fae5;color:#065f46}
    .badge-lr{background:#fef3c7;color:#92400e}.badge-mei{background:#ede9fe;color:#5b21b6}
    .badge-dm{background:#fce7f3;color:#9d174d}.badge-ev{background:#f3f4f6;color:#374151}
    .gridjs-wrapper{border:none!important}
    .gridjs-th{background:var(--bg)!important;font-size:11px!important;font-weight:600!important;color:var(--cinza)!important;text-transform:uppercase}
    .gridjs-td{padding:7px 10px!important;font-size:12px!important}
    .gridjs-tr:hover td{background:var(--azul-claro)!important}
    .prog-wrap{display:flex;align-items:center;gap:5px}
    .prog-bg{flex:1;height:6px;background:var(--borda);border-radius:3px;overflow:hidden;min-width:40px}
    .prog-fill{height:100%;border-radius:3px;background:var(--verde)}
    .prog-pct{font-size:11px;font-weight:600;color:var(--cinza);width:30px;text-align:right}
    .err-box{background:#fde8e8;border:1px solid #fca5a5;border-radius:10px;padding:20px;margin:20px 0}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">📊</div>
    <div>
      <div class="header-title">Central de Controle Fiscal</div>
      <div class="header-sub">ControleObrigação · Supabase ao vivo</div>
    </div>
  </div>
  <div class="header-badge" id="lastUpdate">Carregando…</div>
</div>

<div class="main" id="mainContent">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>Conectando ao Supabase…</div>
  </div>
</div>

<script>
// ── Credenciais do projeto Supabase ──────────────────────────────────────
const SUPABASE_URL = "https://mpbhuoolbkzwfpynrnbg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wYmh1b29sYmt6d2ZweW5ybmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDcxMzgsImV4cCI6MjA5MTc4MzEzOH0.VoVCzcrOG6ptN96iREPdcZjR_C_gOXzHx80cIpOPk90";

// ── Busca view via REST (CORS ok, sem RPC) ────────────────────────────────
async function fetchView(view, params) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${view}?${params}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Accept": "application/json"
    }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`[${view}] HTTP ${res.status}: ${txt}`);
  }
  return res.json();
}

const fmt    = n => Number(n||0).toLocaleString("pt-BR");
const fmtBRL = n => Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
function rtBadge(rt) {
  const m={SN:["badge-sn","SN"],LP:["badge-lp","LP"],LR:["badge-lr","LR"],MEI:["badge-mei","MEI"],DM:["badge-dm","DM"],EV:["badge-ev","EV"]};
  const [cls,lbl]=m[rt]||["badge-ev",rt||"–"];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

async function loadDashboard() {
  try {
    const [clientes, competencias, obrigacoes, financeiro] = await Promise.all([
      fetchView("vw_dashboard_clientes",     "order=razao_social.asc"),
      fetchView("vw_dashboard_competencias", "order=ano.asc,mes.asc"),
      fetchView("vw_dashboard_obrigacoes",   "order=pendentes.desc"),
      fetchView("vw_dashboard_financeiro",   "order=referencia.desc,fin_status.asc")
    ]);

    const ativos       = clientes.filter(c=>c.status==="ativo");
    const ultimaComp   = competencias[competencias.length-1]||{};
    const pendentesMes = Number(ultimaComp.pendentes    ||0);
    const entreguesMes = Number(ultimaComp.entregues    ||0);
    const semMov       = Number(ultimaComp.sem_movimento||0);
    const totalMes     = Number(ultimaComp.total        ||0);
    const totalComMov  = totalMes-semMov;
    const taxaEntrega  = totalComMov>0?Math.round((entreguesMes/totalComMov)*100):0;
    const finUlt       = financeiro.filter(f=>f.referencia===(ultimaComp.referencia||""));
    const valorPago    = Number(finUlt.find(f=>f.fin_status==="pago")?.total_valor    ||0);
    const valorPend    = Number(finUlt.find(f=>f.fin_status==="pendente")?.total_valor||0);

    document.getElementById("loadingState")?.remove();
    document.getElementById("lastUpdate").textContent =
      `Atualizado às ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`;

    document.getElementById("mainContent").innerHTML = `
      <div class="section-title">📌 Visão Geral — ${ultimaComp.referencia||"–"}</div>
      <div class="kpi-grid">
        <div class="kpi-card kpi-blue">
          <div class="kpi-label">🏢 Clientes Ativos</div>
          <div class="kpi-value">${ativos.length}</div>
          <div class="kpi-footer">${ativos.filter(c=>c.rt==="SN").length} SN · ${ativos.filter(c=>c.rt==="LP").length} LP · ${ativos.filter(c=>c.rt==="LR"||c.rt==="EV").length} LR · ${ativos.filter(c=>c.rt==="MEI").length} MEI</div>
        </div>
        <div class="kpi-card kpi-amber">
          <div class="kpi-label">⏳ Pendentes no Mês</div>
          <div class="kpi-value">${fmt(pendentesMes)}</div>
          <div class="kpi-footer">de ${fmt(totalComMov)} obrigações com mov.</div>
        </div>
        <div class="kpi-card kpi-green">
          <div class="kpi-label">✅ Taxa de Entrega</div>
          <div class="kpi-value">${taxaEntrega}%</div>
          <div class="kpi-footer">${fmt(entreguesMes)} entregues · ${fmt(semMov)} sem mov.</div>
        </div>
        <div class="kpi-card kpi-blue">
          <div class="kpi-label">💰 Honorários Pagos</div>
          <div class="kpi-value" style="font-size:22px">${fmtBRL(valorPago)}</div>
          <div class="kpi-footer"><span class="kpi-pill pill-amber">${fmtBRL(valorPend)} pendente</span></div>
        </div>
      </div>

      <div class="section-title" style="margin-top:20px">📅 Competências & Obrigações</div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-header"><div><div class="chart-title">Entregas por Competência</div><div class="chart-sub">Entregues · Pendentes · Sem movimento</div></div></div>
          <div class="chart-wrap"><canvas id="chartComp"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><div><div class="chart-title">Pendências por Obrigação</div><div class="chart-sub">Obrigações em aberto vs. entregues</div></div></div>
          <div class="chart-wrap"><canvas id="chartObrig"></canvas></div>
        </div>
      </div>

      <div class="section-title" style="margin-top:20px">👥 Clientes & Financeiro</div>
      <div class="bottom-row">
        <div class="table-card">
          <div class="chart-header"><div class="chart-title">📋 Painel de Clientes</div></div>
          <div id="gridClientes"></div>
        </div>
        <div class="fin-card">
          <div class="chart-header" style="margin-bottom:10px"><div class="chart-title">💳 Honorários por Mês</div></div>
          <div id="finRows"></div>
        </div>
      </div>
    `;

    new Chart(document.getElementById("chartComp"),{
      type:"bar",
      data:{labels:competencias.map(c=>c.referencia),datasets:[
        {label:"Entregues",    data:competencias.map(c=>Number(c.entregues)),    backgroundColor:"#057a55",borderRadius:4,borderSkipped:false},
        {label:"Pendentes",    data:competencias.map(c=>Number(c.pendentes)),    backgroundColor:"#faca15",borderRadius:4,borderSkipped:false},
        {label:"Sem Movimento",data:competencias.map(c=>Number(c.sem_movimento)),backgroundColor:"#d1d5db",borderRadius:4,borderSkipped:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
        scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:11}}},y:{stacked:true,grid:{color:"#f3f4f6"},ticks:{font:{size:11}}}}}
    });

    const topObrig=obrigacoes.filter(o=>Number(o.pendentes)>0||Number(o.entregues)>0).slice(0,8);
    new Chart(document.getElementById("chartObrig"),{
      type:"bar",
      data:{labels:topObrig.map(o=>o.codigo),datasets:[
        {label:"Pendentes",data:topObrig.map(o=>Number(o.pendentes)),backgroundColor:"#faca15",borderRadius:4},
        {label:"Entregues",data:topObrig.map(o=>Number(o.entregues)),backgroundColor:"#057a55",borderRadius:4}
      ]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
        scales:{x:{stacked:true,grid:{color:"#f3f4f6"},ticks:{font:{size:11}}},y:{stacked:true,grid:{display:false},ticks:{font:{size:11}}}}}
    });

    const gridData=ativos.map(c=>{
      const ent=Number(c.entregues),pen=Number(c.pendentes),mov=ent+pen;
      return[c.razao_social,c.rt||"–",Number(c.qtd_obrigacoes),ent,pen,mov>0?Math.round((ent/mov)*100):100];
    });
    new gridjs.Grid({
      columns:[
        {name:"Cliente",width:"34%"},
        {name:"RT",width:"58px",formatter:v=>gridjs.html(rtBadge(v))},
        {name:"Obrig.",width:"55px",sort:true},{name:"✅",width:"48px",sort:true},{name:"⏳",width:"48px",sort:true},
        {name:"Progresso",sort:true,formatter:v=>gridjs.html(`<div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" style="width:${v}%"></div></div><span class="prog-pct">${v}%</span></div>`)}
      ],
      data:gridData,sort:true,pagination:{limit:10},search:true,
      language:{search:{placeholder:"Buscar cliente…"},pagination:{previous:"←",next:"→",showing:"Exibindo",results:()=>"clientes"}}
    }).render(document.getElementById("gridClientes"));

    const refs=[...new Set(financeiro.map(f=>f.referencia))].sort().reverse();
    const maxTot=Math.max(1,...refs.map(r=>financeiro.filter(f=>f.referencia===r).reduce((s,x)=>s+Number(x.total_valor||0),0)));
    document.getElementById("finRows").innerHTML=refs.map(ref=>{
      const rows=financeiro.filter(f=>f.referencia===ref);
      const pago=Number(rows.find(r=>r.fin_status==="pago")?.total_valor||0);
      const pend=Number(rows.find(r=>r.fin_status==="pendente")?.total_valor||0);
      return`<div class="fin-row">
        <div class="fin-comp">${ref}</div>
        <div class="fin-bars">
          <div class="fin-bar-wrap"><span style="width:38px">Pago</span><div class="fin-bar-bg"><div class="fin-bar-fill fin-bar-pago" style="width:${Math.round(pago/maxTot*100)}%"></div></div></div>
          <div class="fin-bar-wrap"><span style="width:38px">Pend.</span><div class="fin-bar-bg"><div class="fin-bar-fill fin-bar-pend" style="width:${Math.round(pend/maxTot*100)}%"></div></div></div>
        </div>
        <div class="fin-total">${fmtBRL(pago+pend)}</div>
      </div>`;
    }).join("");

  } catch(err) {
    document.getElementById("loadingState")?.remove();
    document.getElementById("mainContent").innerHTML+=`
      <div class="err-box">
        <strong style="color:#c81e1e">⚠️ Erro: ${err.message}</strong>
        <pre style="font-size:11px;margin-top:8px;white-space:pre-wrap;color:#c81e1e">${err.stack||""}</pre>
      </div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
